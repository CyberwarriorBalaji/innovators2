<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovators 2.0 - Secure Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-page-wrapper">
        
        <canvas id="login-fire-canvas"></canvas>
        
        <div class="fire-overlay-glow"></div>

        <div class="login-card animate-fade-in">
            <div class="login-header">
                <div class="company-logo-badge">🔥</div>
                <h1 class="brand-title">INNOVATORS 2.O</h1>
                <p class="brand-tagline">PRESTIGE ARCHITECTURE GATEWAY</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="login-email">Identity Matrix (Email)</label>
                    <input type="email" id="login-email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Access Passphrase</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="primary-btn fire-button">Initialize Authentication</button>
            </form>

            <p class="panel-switch-text">
                Unauthorized terminal? <a href="#">Request Credentials</a>
            </p>
        </div>
    </div>

</body>
</html>
