<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovators 2.0 - Portal Access</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 16px; font-weight: 600; color: var(--primary);">Securing Connection...</p>
    </div>

    <div class="login-wrapper">
        <div class="particle" style="width: 80px; height: 80px; left: 10%; top: 20%; animation-duration: 25s;"></div>
        <div class="particle" style="width: 120px; height: 120px; right: 15%; bottom: 10%; animation-duration: 18s;"></div>
        <div class="particle" style="width: 50px; height: 50px; bottom: 20%; left: 40%; animation-duration: 22s;"></div>

        <div class="glass-card login-card">
            <div class="logo-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 16h-2v2h2v-2zm0-6h-2v4h2v-4z"/>
                </svg>
                <h1>Innovators 2.0</h1>
                <p>Pioneering the Future</p>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" id="tab-standard" onclick="switchLoginMode('standard')">Standard</button>
                <button class="tab-btn" id="tab-otp" onclick="switchLoginMode('otp')">OTP Access</button>
                <button class="tab-btn" id="tab-admin" onclick="switchLoginMode('admin')">Corporate Head</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label id="identityLabel">Corporate Email Address</label>
                    <input type="text" id="username" class="form-control" required placeholder="name@innovators.com">
                </div>

                <div class="form-group" id="passwordGroup">
                    <label>Secure Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 6px; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox" id="rememberMe"> Remember Profile
                    </label>
                    <a href="#" onclick="triggerForgotPassword()" style="color: var(--secondary); text-decoration: none; font-weight: 500;">Forgot Security Key?</a>
                </div>

                <button type="submit" class="btn-ripple btn-primary" style="width: 100%;">Authenticate Identity</button>
            </form>

            <div class="alternative-login" id="socialAuth">
                <button class="btn-alt" onclick="simulateGoogleLogin()">
                    <svg style="width:16px; height:16px" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.327-3.2c-2.134-1.986-4.907-3.2-8.374-3.2C5.377 0 0 5.377 0 12s5.377 12 12 12c6.912 0 11.52-4.86 11.52-11.727 0-.788-.085-1.39-.188-1.988H12.24z"/></svg>
                    Google Sync
                </button>
                <button class="btn-alt" onclick="window.location.href='register.html'">
                    Onboard/Register
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 24px;">
                <button onclick="toggleGlobalTheme()" class="btn-alt" style="margin: 0 auto; padding: 6px 12px; font-size: 0.75rem;">Switch Interface Theme</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
