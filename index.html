<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovators 2.o - Enterprise Entry Node</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="login-page-wrapper">
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        
        <div class="glass-card login-card animate-fade-in">
            <div class="login-header">
                <div class="company-logo-badge">🚀</div>
                <h1 class="brand-title">Innovators 2.o</h1>
                <p class="brand-tagline">Secure Profile Registry Core</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label>Corporate Email / Username</label>
                    <input type="text" id="login-email" placeholder="balaji@innovators.com or 'worker'" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Security Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="off">
                </div>
                <button type="submit" class="primary-btn full-width">Authenticate Node</button>
            </form>

            <div class="oauth-divider"><span>Enterprise Single Sign-On</span></div>
            <button type="button" id="btn-google-login" class="google-btn">Continue with Google Cloud IAM</button>
        </div>
    </div>

    <div id="google-modal-portal" class="modal-backdrop hidden">
        <div class="glass-card modal-window animate-fade-in">
            <h3>Google Workspace Identity Linker</h3>
            <p style="margin-bottom: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">Select an active profile connection state to bypass manual validation entry:</p>
            <div class="google-profiles-list">
                <button class="google-profile-option" data-target-email="balaji@innovators.com">
                    <div class="g-avatar">👑</div>
                    <div class="g-info"><h4>Balaji (Head Director)</h4><p>balaji@innovators.com</p></div>
                </button>
                <button class="google-profile-option" data-target-email="worker">
                    <div class="g-avatar">👨‍💻</div>
                    <div class="g-info"><h4>Arun Kumar S (Worker Node)</h4><p>worker@innovators.com</p></div>
                </button>
            </div>
            <button type="button" class="secondary-btn full-width" id="close-google-modal" style="margin-top: 1.25rem;">Cancel Link</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
